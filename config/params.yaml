# Hyperparameters cho Model Training
# Cấu hình vùng không gian tìm kiếm (search space) cho Optuna

LightGBM:
  n_estimators: [50, 300]
  max_depth: [3, 10]
  learning_rate: [0.01, 0.3]
  n_trials: 15

XGBoost:
  n_estimators: [50, 300]
  max_depth: [3, 10]
  learning_rate: [0.01, 0.3]
  n_trials: 15

CatBoost:
  iterations: [50, 300]
  depth: [3, 10]
  learning_rate: [0.01, 0.3]
  n_trials: 15
